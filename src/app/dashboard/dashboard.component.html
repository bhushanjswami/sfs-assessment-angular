<div class="container mt-4">

  <!-- Row 1 -->
  <div class="row mb-3">
    <div class="col-md-6">

      <div class="d-flex gap-2 align-items-center">

  <select
    class="form-select"
    style="width: 200px;"
    [(ngModel)]="selectedDevice">

    <option value="" disabled selected>
      Choose Device
    </option>

    <option
      *ngFor="let device of devices"
      [value]="device">

      {{ device }}

    </option>

  </select>

  <button
    type="button"
    class="btn btn-primary"
    (click)="selectDevice(selectedDevice)">

    Submit

  </button>

</div>
    </div>
  </div>

  <!-- Row 2 -->
  <div class="row mb-3">

    <div class="col-md-6">
      <div class="p-3 text-white bg-success">
        2
      </div>
    </div>

    <div class="col-md-6">
      <div class="p-3 text-white bg-primary">
        3
      </div>
    </div>

  </div>

  <!-- Row 3 -->
  <div class="row">

    <div class="col-md-6">
      <div class="p-3 bg-warning">
        4
      </div>
    </div>

  </div>

</div>
